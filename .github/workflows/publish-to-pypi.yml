name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import ast
          import os
          from pathlib import Path

          version_file = Path("mckit/_version.py")
          tree = ast.parse(version_file.read_text(encoding="utf-8"))
          package_version = next(
              node.value.value
              for node in tree.body
              if isinstance(node, ast.Assign)
              and any(
                  isinstance(target, ast.Name) and target.id == "__version__"
                  for target in node.targets
              )
              and isinstance(node.value, ast.Constant)
              and isinstance(node.value.value, str)
          )
          release_version = os.environ["RELEASE_TAG"].removeprefix("v")
          if release_version != package_version:
              raise SystemExit(
                  f"Release tag {release_version!r} does not match "
                  f"package version {package_version!r}"
              )
          PY

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build wheel and source distribution
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Store distributions
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish distribution
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/matcraft-kit/
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
